<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Graph Ball Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', monospace;
    color: #e6edf3;
    overflow: hidden;
  }

  #header {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 16px;
  }

  #header svg {
    width: 32px;
    height: 32px;
    fill: #e6edf3;
  }

  #title {
    font-size: 13px;
    color: #7d8590;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #score-row {
    display: flex;
    gap: 32px;
    margin-bottom: 12px;
    font-size: 12px;
    color: #7d8590;
  }

  #score-row span { color: #39d353; }

  #game-wrapper {
    position: relative;
    border: 1px solid #21262d;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(57,211,83,0.08);
  }

  canvas {
    display: block;
    cursor: none;
  }

  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,17,23,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(2px);
  }

  #overlay h2 {
    font-size: 22px;
    font-weight: 700;
    color: #39d353;
    letter-spacing: 0.05em;
  }

  #overlay p {
    font-size: 12px;
    color: #7d8590;
    text-align: center;
    line-height: 1.7;
  }

  #overlay .final-score {
    font-size: 13px;
    color: #e6edf3;
  }

  #start-btn {
    margin-top: 8px;
    background: #238636;
    border: 1px solid #2ea043;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 8px 24px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.05em;
  }

  #start-btn:hover { background: #2ea043; }

  #footer {
    margin-top: 12px;
    font-size: 11px;
    color: #30363d;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div id="header">
  <!-- GitHub Octocat-ish icon -->
  <svg viewBox="0 0 16 16">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
    -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
    .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
    -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
    .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
    .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
    0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
  </svg>
  <span id="title">contribution graph · ball game</span>
</div>

<div id="score-row">
  <div>bounces: <span id="score">0</span></div>
  <div>time: <span id="timer">0s</span></div>
  <div>streak: <span id="streak">0</span></div>
</div>

<div id="game-wrapper">
  <canvas id="canvas"></canvas>
  <div id="overlay">
    <h2>⬤ ball.exe</h2>
    <p>Move your mouse / finger to control the paddle.<br>Don't let the ball fall!</p>
    <button id="start-btn">▶ Start Game</button>
  </div>
</div>

<div id="footer">move paddle → keep ball alive → survive</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const streakEl = document.getElementById('streak');

// --- Grid config ---
const COLS = 53;
const ROWS = 7;
const CELL = 13;
const GAP = 3;
const GRID_PAD_X = 18;
const GRID_PAD_TOP = 18;
const PADDLE_AREA = 54;

const W = GRID_PAD_X * 2 + COLS * (CELL + GAP) - GAP;
const H = GRID_PAD_TOP * 2 + ROWS * (CELL + GAP) - GAP + PADDLE_AREA + 40;

canvas.width = W;
canvas.height = H;

// Contribution colors (GitHub dark theme)
const CONTRIB_COLORS = ['#161b22', '#0e4429', '#006d32', '#26a641', '#39d353'];

// Generate a random contribution grid
function makeGrid() {
  const grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const rand = Math.random();
      let level = 0;
      if (rand > 0.6) level = 1;
      if (rand > 0.75) level = 2;
      if (rand > 0.87) level = 3;
      if (rand > 0.95) level = 4;
      grid[r][c] = { level, lit: false, litTimer: 0 };
    }
  }
  return grid;
}

let grid = makeGrid();

// Paddle
const PADDLE_W = 80;
const PADDLE_H = 10;
const PADDLE_Y = H - 32;
let paddleX = W / 2 - PADDLE_W / 2;

// Ball
const BALL_R = 8;
let ball = { x: W/2, y: H*0.6, vx: 3.2, vy: -3.8 };

// Game state
let running = false;
let bounces = 0;
let streak = 0;
let startTime = 0;
let animId = null;
let gameOver = false;

// Cell coordinate helpers
function cellRect(r, c) {
  const x = GRID_PAD_X + c * (CELL + GAP);
  const y = GRID_PAD_TOP + r * (CELL + GAP);
  return { x, y, w: CELL, h: CELL };
}

function gridBounds() {
  return {
    left: GRID_PAD_X,
    top: GRID_PAD_TOP,
    right: GRID_PAD_X + COLS * (CELL + GAP) - GAP,
    bottom: GRID_PAD_TOP + ROWS * (CELL + GAP) - GAP
  };
}

// Input
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  paddleX = mx - PADDLE_W / 2;
  clampPaddle();
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - rect.left) * (W / rect.width);
  paddleX = mx - PADDLE_W / 2;
  clampPaddle();
}, { passive: false });

function clampPaddle() {
  paddleX = Math.max(0, Math.min(W - PADDLE_W, paddleX));
}

startBtn.addEventListener('click', startGame);

function startGame() {
  overlay.style.display = 'none';
  grid = makeGrid();
  ball = { x: W/2, y: H*0.6, vx: (Math.random() > 0.5 ? 1 : -1) * 3.4, vy: -4 };
  paddleX = W/2 - PADDLE_W/2;
  bounces = 0; streak = 0;
  startTime = Date.now();
  gameOver = false;
  running = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function showGameOver() {
  running = false;
  gameOver = true;
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <h2 style="color:#f85149">✕ game over</h2>
    <p class="final-score">bounces: <span style="color:#39d353">${bounces}</span> &nbsp;|&nbsp; streak: <span style="color:#39d353">${streak}</span><br>time: <span style="color:#39d353">${timerEl.textContent}</span></p>
    <button id="start-btn" style="margin-top:8px;background:#238636;border:1px solid #2ea043;color:#fff;font-family:'JetBrains Mono',monospace;font-size:13px;padding:8px 24px;border-radius:6px;cursor:pointer;">↩ Try Again</button>
  `;
  document.getElementById('start-btn').addEventListener('click', startGame);
}

// Light up nearest grid cell to ball
function lightCells() {
  const gb = gridBounds();
  if (ball.x < gb.left || ball.x > gb.right || ball.y < gb.top || ball.y > gb.bottom) return;
  const c = Math.floor((ball.x - GRID_PAD_X) / (CELL + GAP));
  const r = Math.floor((ball.y - GRID_PAD_TOP) / (CELL + GAP));
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    grid[r][c].lit = true;
    grid[r][c].litTimer = 60;
    if (grid[r][c].level < 4) grid[r][c].level++;
  }
}

function update() {
  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Light cells near ball
  lightCells();

  // Update lit timers
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].litTimer > 0) grid[r][c].litTimer--;
      if (grid[r][c].litTimer === 0) grid[r][c].lit = false;
    }

  // Wall bounces: left / right
  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
  if (ball.x + BALL_R >= W) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }

  // Top wall
  if (ball.y - BALL_R <= 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

  // Paddle collision
  const px = paddleX, py = PADDLE_Y;
  if (
    ball.vy > 0 &&
    ball.y + BALL_R >= py &&
    ball.y + BALL_R <= py + PADDLE_H + 4 &&
    ball.x >= px - 4 &&
    ball.x <= px + PADDLE_W + 4
  ) {
    // Angle based on hit position on paddle
    const hitPos = (ball.x - (px + PADDLE_W / 2)) / (PADDLE_W / 2); // -1 to 1
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    const newAngle = hitPos * 1.1; // max ~63 deg
    ball.vx = speed * Math.sin(newAngle);
    ball.vy = -Math.abs(speed * Math.cos(newAngle));
    ball.y = py - BALL_R;

    bounces++;
    streak++;
    scoreEl.textContent = bounces;
    streakEl.textContent = streak;

    // Slightly speed up over time
    const spd = Math.sqrt(ball.vx**2 + ball.vy**2);
    if (spd < 7) {
      const factor = 1.015;
      ball.vx *= factor;
      ball.vy *= factor;
    }
  }

  // Ball fell below paddle
  if (ball.y - BALL_R > H + 10) {
    showGameOver();
    return false;
  }

  // Update timer
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  timerEl.textContent = elapsed + 's';

  return true;
}

function drawGrid() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const { x, y } = cellRect(r, c);
      const cell = grid[r][c];
      let color = CONTRIB_COLORS[cell.level];

      // Glow effect when lit
      if (cell.lit || cell.litTimer > 0) {
        const alpha = Math.min(1, cell.litTimer / 30);
        ctx.save();
        ctx.shadowColor = '#39d353';
        ctx.shadowBlur = 8 * alpha;
        ctx.fillStyle = '#39d353';
        ctx.beginPath();
        ctx.roundRect(x, y, CELL, CELL, 2);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, CELL, CELL, 2);
        ctx.fill();
      }
    }
  }
}

function drawPaddle() {
  // Paddle glow
  ctx.save();
  ctx.shadowColor = '#39d353';
  ctx.shadowBlur = 14;
  const grad = ctx.createLinearGradient(paddleX, 0, paddleX + PADDLE_W, 0);
  grad.addColorStop(0, '#238636');
  grad.addColorStop(0.5, '#39d353');
  grad.addColorStop(1, '#238636');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddleX, PADDLE_Y, PADDLE_W, PADDLE_H, 5);
  ctx.fill();
  ctx.restore();
}

function drawBall() {
  ctx.save();
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 16;
  const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#adbac7');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawFloor() {
  // Subtle dashed line showing paddle zone
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(0, PADDLE_Y - 16);
  ctx.lineTo(W, PADDLE_Y - 16);
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawFloor();
  drawPaddle();
  drawBall();

  // Month labels (like GitHub)
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  ctx.fillStyle = '#7d8590';
  ctx.font = '9px JetBrains Mono, monospace';
  for (let i = 0; i < 12; i++) {
    const c = Math.round(i * (COLS / 12));
    const x = GRID_PAD_X + c * (CELL + GAP);
    ctx.fillText(months[i], x, GRID_PAD_TOP + ROWS * (CELL + GAP) + 12);
  }
}

function loop() {
  if (!running) return;
  const alive = update();
  if (alive) {
    draw();
    animId = requestAnimationFrame(loop);
  }
}

// Initial draw
draw();
</script>
</body>
</html>
